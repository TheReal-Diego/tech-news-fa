<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080b"/>
      <stop offset="100%" stop-color="#111116"/>
    </linearGradient>
    <radialGradient id="glow1" cx="12%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#f2b84b" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f2b84b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="92%" cy="95%" r="50%">
      <stop offset="0%" stop-color="#f2b84b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f2b84b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9d68a"/>
      <stop offset="100%" stop-color="#d99a2b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#glow1)"/>
  <rect width="1200" height="260" fill="url(#glow2)"/>

  <!-- waveform / frequency signature mark -->
  <g transform="translate(90,130)" stroke="#f2b84b" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <line x1="14" y1="-22" x2="14" y2="22"/>
    <line x1="28" y1="-34" x2="28" y2="34"/>
    <line x1="42" y1="-16" x2="42" y2="16"/>
    <line x1="56" y1="-28" x2="56" y2="28"/>
  </g>

  <!-- title -->
  <text x="185" y="118" font-family="Arial, sans-serif" font-size="58" font-weight="700" fill="url(#goldText)">Frequency</text>
  <text x="187" y="150" font-family="Arial, sans-serif" font-size="19" fill="#8b8d99">Daily tech &amp; AI news, archived in Persian.</text>

  <line x1="187" y1="170" x2="640" y2="170" stroke="#f2b84b" stroke-width="1.5" opacity="0.5"/>
  <text x="187" y="198" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" fill="#565a68">فرکانس — اخبار تکنولوژی و هوش مصنوعی</text>

  <!-- language chips (decorative) -->
  <g font-family="Arial" font-size="12" fill="#8b8d99">
    <rect x="900" y="90" width="58" height="26" rx="13" fill="none" stroke="#2a2c33"/>
    <text x="929" y="107" text-anchor="middle" fill="#f2b84b">فا</text>
    <rect x="966" y="90" width="58" height="26" rx="13" fill="none" stroke="#2a2c33"/>
    <text x="995" y="107" text-anchor="middle">EN</text>
    <rect x="1032" y="90" width="58" height="26" rx="13" fill="none" stroke="#2a2c33"/>
    <text x="1061" y="107" text-anchor="middle">FR</text>
    <rect x="900" y="124" width="58" height="26" rx="13" fill="none" stroke="#2a2c33"/>
    <text x="929" y="141" text-anchor="middle">ES</text>
    <rect x="966" y="124" width="58" height="26" rx="13" fill="none" stroke="#2a2c33"/>
    <text x="995" y="141" text-anchor="middle">RU</text>
  </g>
</svg>
